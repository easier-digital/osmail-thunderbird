name: Build OSMail Thunderbird Installer
on:
  workflow_dispatch:
    inputs:
      thunderbird_version:
        description: 'Thunderbird version to build'
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - 'distribution/**'
      - 'theme/**'
      - 'addon/**'

permissions:
  contents: write

jobs:
  # ── Job 1: Build Extensions (ubuntu) ─────────────────────────
  build-extensions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate theme manifest
        run: python3 -m json.tool theme/manifest.json > /dev/null

      - name: Validate addon manifest
        run: python3 -m json.tool addon/manifest.json > /dev/null

      - name: Build theme XPI
        run: |
          chmod +x theme/build.sh
          theme/build.sh

      - name: Build onboarding XPI
        run: |
          cp theme/icons/logo.png addon/icons/icon-64.png
          cd addon
          zip -r ../distribution/extensions/osmail-onboarding.xpi \
            manifest.json background.js config.json \
            onboarding/ experiments/ icons/
          echo "SHA256: $(sha256sum ../distribution/extensions/osmail-onboarding.xpi)"
          echo "Onboarding XPI built successfully."

      - uses: actions/upload-artifact@v4
        with:
          name: theme-xpi
          path: distribution/extensions/osmail-theme.xpi

      - uses: actions/upload-artifact@v4
        with:
          name: onboarding-xpi
          path: distribution/extensions/osmail-onboarding.xpi

  # ── Job 2: Build Installer Package ─────────────────────────
  build-installer:
    runs-on: windows-latest
    needs: build-extensions
    steps:
      - uses: actions/checkout@v4

      - name: Mask secret
        run: echo "::add-mask::${{ secrets.OAUTH_CLIENT_SECRET }}"

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $ver = "${{ inputs.thunderbird_version }}"
          if (-not $ver) {
            $ver = (Get-Content .thunderbird-version -Raw).Trim()
          }
          echo "tb_version=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Building for Thunderbird $ver"

      - name: Create staging directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path staging/distribution/extensions -Force

      - name: Download extension artifacts
        uses: actions/download-artifact@v4
        with:
          name: theme-xpi
          path: staging/distribution/extensions/

      - uses: actions/download-artifact@v4
        with:
          name: onboarding-xpi
          path: staging/distribution/extensions/

      - name: Bake OAuth secret into onboarding XPI
        shell: pwsh
        run: |
          $xpiPath = "staging/distribution/extensions/osmail-onboarding.xpi"
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::Open($xpiPath, 'Update')
          $entry = $zip.GetEntry('config.json')
          $reader = New-Object System.IO.StreamReader($entry.Open())
          $content = $reader.ReadToEnd()
          $reader.Close()
          $patched = $content.Replace('__OAUTH_CLIENT_SECRET__', '${{ secrets.OAUTH_CLIENT_SECRET }}')
          $entry.Delete()
          $newEntry = $zip.CreateEntry('config.json')
          $writer = New-Object System.IO.StreamWriter($newEntry.Open())
          $writer.Write($patched)
          $writer.Close()
          $zip.Dispose()
          Write-Host "OAuth secret baked into onboarding XPI"

      - name: Download Thunderbird MSI
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.tb_version }}"
          $url = "https://releases.mozilla.org/pub/thunderbird/releases/$ver/win64/en-US/Thunderbird%20Setup%20$ver.msi"
          Write-Host "Downloading: $url"
          Invoke-WebRequest -Uri $url -OutFile "staging/Thunderbird Setup $ver.msi" -UseBasicParsing
          $size = (Get-Item "staging/Thunderbird Setup $ver.msi").Length
          if ($size -eq 0) {
            Write-Error "MSI download failed — file is empty"
            exit 1
          }
          Write-Host "MSI downloaded: $size bytes"

      - name: Rename XPIs to extension IDs
        shell: pwsh
        run: |
          Rename-Item "staging/distribution/extensions/osmail-theme.xpi" "osmail-theme@osmail.ca.xpi"
          Rename-Item "staging/distribution/extensions/osmail-onboarding.xpi" "osmail-onboarding@osmail.ca.xpi"

      - name: Copy distribution files and version
        shell: pwsh
        run: |
          Copy-Item distribution/policies.json staging/distribution/ -Force
          Copy-Item .thunderbird-version staging/ -Force

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.tb_version }}"
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" `
            /DAppVersion="$ver" `
            /O"." `
            installer/osmail-setup.iss
          $exe = "OSMail-Setup.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Inno Setup failed — no output exe"
            exit 1
          }
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash
          $size = (Get-Item $exe).Length
          echo "exe_name=$exe" >> $env:GITHUB_OUTPUT
          echo "exe_sha256=$hash" >> $env:GITHUB_OUTPUT
          Write-Host "Installer built: $exe ($size bytes) SHA256: $hash"
        id: package

      - uses: actions/upload-artifact@v4
        with:
          name: installer-exe
          path: ${{ steps.package.outputs.exe_name }}

  # ── Job 3: Create GitHub Release ───────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: build-installer
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          VER="${{ inputs.thunderbird_version }}"
          if [ -z "$VER" ]; then
            VER=$(cat .thunderbird-version | tr -d '[:space:]')
          fi
          echo "tb_version=$VER" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          name: installer-exe
          path: dist/

      - name: Compute SHA256
        id: hash
        run: |
          SHA=$(sha256sum dist/OSMail-Setup.exe | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.tb_version }}-osmail
          name: OSMail Thunderbird ${{ steps.version.outputs.tb_version }}
          body: |
            ## OSMail Thunderbird ${{ steps.version.outputs.tb_version }}

            **Upstream Thunderbird version**: ${{ steps.version.outputs.tb_version }}
            **SHA256**: `${{ steps.hash.outputs.sha256 }}`

            ### Install
            Download **OSMail-Setup.exe** and run it. Thunderbird will be installed
            with OSMail configuration. On first launch, enter your email address
            and sign in — email, calendar, and contacts are configured automatically.
          files: dist/OSMail-Setup.exe
